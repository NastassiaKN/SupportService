<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
        {% endblock %}
    </title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fb;
            color: #1e293b;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(15, 23, 42, 0.04);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #4f46e5;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #475569;
            font-size: 15px;
            padding: 10px 14px;
            border-radius: 10px;
            transition: 0.2s ease;
        }

        .nav-links a:hover {
            background: #eef2ff;
            color: #4338ca;
        }

        .file-upload {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-label {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #eef2ff;
            color: #4338ca;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            transition: 0.2s ease;
        }

        .file-label:hover {
            background: #e0e7ff;
        }

        .file-label input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            font-size: 14px;
            color: #64748b;
        }

        .nav-links .primary-link {
            background: #4f46e5;
            color: #ffffff;
            font-weight: 600;
        }

        .nav-links .primary-link:hover {
            background: #4338ca;
            color: #ffffff;
        }

        .page-header h1 {
            margin: 0 0 8px;
            font-size: 30px;
            font-weight: 700;
        }

        .page-header p {
            margin: 0;
            color: #64748b;
            font-size: 15px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-new {
            background: #e0f2fe;
            color: #0369a1;
        }

        .status-in-progress {
            background: #fef3c7;
            color: #b45309;
        }

        .status-resolved {
            background: #dcfce7;
            color: #15803d;
        }

        .status-closed {
            background: #e2e8f0;
            color: #475569;
        }

    </style>
    {% block extra_css %}
    {% endblock %}
</head>
<body>
<div class="page">

    <div class="navbar">
        {% block navbar %}
        {% endblock %}
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</div>
</body>
</html>
