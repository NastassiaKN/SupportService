<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
        {% endblock %}
    </title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            color: #1e293b;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        }

        .navbar .logo {
            font-size: 22px;
            font-weight: 700;
            color: #4f46e5;
        }

        .navbar .nav-links a {
            text-decoration: none;
            color: #475569;
            margin-left: 20px;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }

        .navbar .nav-links a:hover {
            color: #4f46e5;
        }

        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-card h1 {
            margin: 0 0 10px;
            font-size: 30px;
            color: #0f172a;
            text-align: center;
        }

        .auth-card p {
            margin: 0 0 28px;
            text-align: center;
            color: #64748b;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            background: #fff;
        }

        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        .errorlist {
            margin: 6px 0 0;
            padding: 10px 12px;
            list-style: none;
            border-radius: 10px;
            background: #fef2f2;
            color: #b91c1c;
            font-size: 13px;
        }

        .form-error-box {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            font-size: 14px;
        }

        .auth-button {
            width: 100%;
            border: none;
            background: #4f46e5;
            color: white;
            font-size: 15px;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .auth-button:hover {
            background: #4338ca;
        }

        .auth-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            color: #64748b;
        }

        .auth-footer a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 16px 20px;
            }

            .auth-card {
                padding: 26px 20px;
            }

            .auth-card h1 {
                font-size: 26px;
            }
        }
    </style>
    {% block extra_css %}
    {% endblock %}
</head>
<body>
<div class="page">

    <div class="navbar">
        {% block navbar %}
        {% endblock %}
    </div>

    <div class="auth-container">
        {% block content %}
        {% endblock %}
    </div>
</div>
</body>
</html>
